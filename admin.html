<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NexDown — Admin Panel</title>
<link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dtc7vwbm7/image/upload/v1773713181/j6sr8hhpamotcf0gtnzl.jpg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08070f;--surface:#110f1e;--surface2:#1a1730;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#f0eeff;--muted:#6b6488;--muted2:#9490b8;
  --accent:#a78bfa;--accent2:#f472b6;--green:#34d399;--red:#f87171;
  --r-sm:10px;--r-md:16px;--r-lg:22px;--r-xl:30px;
  --shadow:0 8px 40px rgba(0,0,0,.65);
  --glow:0 0 30px rgba(167,139,250,.2);
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(167,139,250,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(244,114,182,.09) 0%,transparent 60%)}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.login-panel{position:relative;z-index:1;width:100%;max-width:380px;background:rgba(17,15,30,.97);border:1px solid var(--border2);border-radius:var(--r-xl);padding:36px 28px 32px;box-shadow:var(--shadow),var(--glow);animation:slideUp .5s cubic-bezier(.22,1,.36,1) forwards}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.login-logo img{width:44px;height:44px;border-radius:13px;object-fit:cover;border:1.5px solid var(--border2)}
.login-logo-text{font-family:var(--font-head);font-size:1.45rem;font-weight:800;background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-sub{font-size:.78rem;color:var(--muted);margin-bottom:8px}
.login-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.25);border-radius:20px;padding:4px 12px;font-size:.7rem;font-family:var(--font-head);color:var(--accent);font-weight:700;letter-spacing:.04em;margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.74rem;color:var(--muted2);margin-bottom:6px;font-family:var(--font-head);font-weight:700;letter-spacing:.02em}
.field input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:var(--font-body);font-size:.9rem;padding:12px 14px;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(167,139,250,.12)}
.field input::placeholder{color:var(--muted)}
.login-err{display:block;font-size:.74rem;color:var(--red);margin-bottom:10px;min-height:1em;animation:fadeIn .2s ease}
.login-btn{width:100%;padding:13px;border:none;border-radius:var(--r-md);background:linear-gradient(135deg,#a78bfa,#f472b6);color:#fff;font-family:var(--font-head);font-size:.95rem;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:opacity .2s,transform .15s;box-shadow:0 4px 20px rgba(167,139,250,.3);margin-top:2px}
.login-btn:hover{transform:translateY(-1px);opacity:.92}
.login-btn:active{transform:none}
.login-btn.shake{animation:shake .35s ease}

/* ── ADMIN PANEL ── */
#adminPanel{min-height:100dvh;display:flex;flex-direction:column;max-width:560px;margin:0 auto;padding:0 16px 60px;position:relative;z-index:1}
.admin-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 18px;border-bottom:1px solid var(--border);margin-bottom:20px}
.admin-header-left{display:flex;align-items:center;gap:10px}
.admin-header-left img{width:38px;height:38px;border-radius:12px;object-fit:cover;border:1.5px solid var(--border2)}
.admin-title{font-family:var(--font-head);font-size:1.05rem;font-weight:800;background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.admin-sub{font-size:.66rem;color:var(--muted);margin-top:2px}
.logout-btn{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--red);padding:7px 16px;border-radius:8px;cursor:pointer;font-family:var(--font-head);font-size:.72rem;font-weight:700;transition:background .2s}
.logout-btn:hover{background:rgba(248,113,113,.22)}

.admin-stats{display:flex;gap:10px;margin-bottom:22px}
.stat-card{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);padding:14px 12px}
.stat-val{font-family:var(--font-head);font-size:1.7rem;font-weight:800;line-height:1;background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-lbl{font-size:.66rem;color:var(--muted);margin-top:4px}

.section-title{font-family:var(--font-head);font-size:.88rem;font-weight:800;color:var(--text);margin-bottom:14px}

/* ── ULASAN CARD ── */
.admin-ulasan-list{display:flex;flex-direction:column;gap:14px}
.admin-ulasan-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);overflow:hidden;animation:fadeIn .3s ease}
.auc-head{padding:14px 14px 6px;display:flex;align-items:flex-start;justify-content:space-between}
.auc-nama{font-family:var(--font-head);font-size:.86rem;font-weight:700;color:var(--text)}
.auc-waktu{font-size:.64rem;color:var(--muted);margin-top:2px}
.auc-stars{display:flex;gap:2px;padding:2px 14px 8px}
.auc-stars span{font-size:.95rem;color:var(--border2)}
.auc-stars span.on{color:#f59e0b}
.auc-teks{font-size:.8rem;color:var(--muted2);padding:0 14px 12px;line-height:1.55}
.auc-teks.empty{color:var(--muted);font-style:italic}

.auc-reply-block{background:rgba(167,139,250,.07);border-top:1px solid var(--border);padding:10px 14px 12px}
.auc-reply-lbl{font-size:.64rem;font-family:var(--font-head);color:var(--accent);font-weight:700;margin-bottom:5px}
.auc-reply-txt{font-size:.79rem;color:var(--muted2);line-height:1.5}

.auc-actions{display:flex;gap:8px;padding:0 14px 12px;flex-wrap:wrap}
.btn-balas{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.28);color:var(--accent);padding:7px 14px;border-radius:8px;cursor:pointer;font-family:var(--font-head);font-size:.71rem;font-weight:700;transition:background .2s}
.btn-balas:hover{background:rgba(167,139,250,.24)}
.btn-hapus{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--red);padding:7px 14px;border-radius:8px;cursor:pointer;font-family:var(--font-head);font-size:.71rem;font-weight:700;transition:background .2s}
.btn-hapus:hover{background:rgba(248,113,113,.22)}

.auc-reply-form{border-top:1px solid var(--border);padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.reply-textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:.82rem;padding:10px 12px;outline:none;resize:none;line-height:1.45;transition:border-color .2s}
.reply-textarea:focus{border-color:var(--accent)}
.reply-textarea::placeholder{color:var(--muted)}
.reply-form-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-kirim{background:linear-gradient(135deg,#a78bfa,#f472b6);border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:var(--font-head);font-size:.74rem;font-weight:700;transition:opacity .2s}
.btn-kirim:hover{opacity:.86}
.btn-batal{background:var(--surface2);border:1px solid var(--border);color:var(--muted2);padding:8px 14px;border-radius:8px;cursor:pointer;font-family:var(--font-body);font-size:.74rem;transition:background .2s}
.btn-batal:hover{background:rgba(255,255,255,.06)}

.admin-empty{text-align:center;padding:40px 20px;background:var(--surface);border:1px dashed var(--border2);border-radius:var(--r-lg);color:var(--muted);font-size:.82rem;line-height:1.6}

/* ── CONFIRM MODAL ── */
#confirmModal{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
#confirmModal.hidden{display:none!important}
.confirm-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px)}
.confirm-panel{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);padding:26px 22px;max-width:300px;width:100%;animation:fadeIn .2s ease;box-shadow:var(--shadow)}
.confirm-title{font-family:var(--font-head);font-weight:800;font-size:.97rem;margin-bottom:8px;color:var(--text)}
.confirm-sub{font-size:.79rem;color:var(--muted2);line-height:1.55;margin-bottom:20px}
.confirm-btns{display:flex;gap:10px}
.confirm-yes{flex:1;padding:11px;background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.35);color:var(--red);border-radius:8px;cursor:pointer;font-family:var(--font-head);font-size:.82rem;font-weight:700;transition:background .2s}
.confirm-yes:hover{background:rgba(248,113,113,.28)}
.confirm-no{flex:1;padding:11px;background:var(--surface2);border:1px solid var(--border);color:var(--muted2);border-radius:8px;cursor:pointer;font-family:var(--font-body);font-size:.82rem;transition:background .2s}
.confirm-no:hover{background:rgba(255,255,255,.06)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
</style>
</head>
<body>
<div class="bg-glow"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-panel">
    <div class="login-logo">
      <img src="https://res.cloudinary.com/dtc7vwbm7/image/upload/v1773713181/j6sr8hhpamotcf0gtnzl.jpg" alt="NexDown"/>
      <span class="login-logo-text">NexDown</span>
    </div>
    <p class="login-sub">Masuk ke dasbor admin</p>
    <div class="login-badge">&#128272; Admin Panel</div>
    <div class="field">
      <label for="loginUser">Username</label>
      <input type="text" id="loginUser" placeholder="Masukkan username" autocomplete="off" spellcheck="false"/>
    </div>
    <div class="field">
      <label for="loginPass">Password</label>
      <input type="password" id="loginPass" placeholder="Masukkan password"/>
    </div>
    <span class="login-err hidden" id="loginErr">&#9888; Username atau password salah.</span>
    <button class="login-btn" id="loginBtn">Masuk</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
  <div class="admin-header">
    <div class="admin-header-left">
      <img src="https://res.cloudinary.com/dtc7vwbm7/image/upload/v1773713181/j6sr8hhpamotcf0gtnzl.jpg" alt="NexDown"/>
      <div>
        <div class="admin-title">Admin Panel</div>
        <div class="admin-sub">NexDown Downloader</div>
      </div>
    </div>
    <button class="logout-btn" id="logoutBtn">Keluar</button>
  </div>
  <div class="admin-stats">
    <div class="stat-card"><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">Total Ulasan</div></div>
    <div class="stat-card"><div class="stat-val" id="statAvg">0.0</div><div class="stat-lbl">Rata-rata &#11088;</div></div>
    <div class="stat-card"><div class="stat-val" id="statReplied">0</div><div class="stat-lbl">Dibalas</div></div>
  </div>
  <p class="section-title">&#128172; Semua Ulasan</p>
  <div class="admin-ulasan-list" id="adminList"></div>
</div>

<!-- CONFIRM HAPUS -->
<div id="confirmModal" class="hidden">
  <div class="confirm-overlay" id="confirmOverlay"></div>
  <div class="confirm-panel">
    <p class="confirm-title">Hapus Ulasan?</p>
    <p class="confirm-sub">Ulasan ini akan dihapus permanen dan tidak bisa dipulihkan.</p>
    <div class="confirm-btns">
      <button class="confirm-yes" id="confirmYes">Hapus</button>
      <button class="confirm-no" id="confirmNo">Batal</button>
    </div>
  </div>
</div>

<script>
'use strict';
const STORAGE_KEY = 'nexdown_ulasan';
const SESSION_KEY = 'nexdown_admin_session';
const ADMIN_USER  = 'adminex386';
const ADMIN_PASS  = 'd4nc0w_en4k_t4u';
const $ = id => document.getElementById(id);

/* ── SESSION ── */
function checkSession(){
  if(sessionStorage.getItem(SESSION_KEY)==='1'){
    $('loginScreen').classList.add('hidden');
    $('adminPanel').classList.remove('hidden');
    renderAdmin();
  }
}

$('loginBtn').addEventListener('click', doLogin);
$('loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
$('loginUser').addEventListener('keydown', e=>{ if(e.key==='Enter') $('loginPass').focus(); });

function doLogin(){
  const u=$('loginUser').value.trim();
  const p=$('loginPass').value;
  if(u===ADMIN_USER && p===ADMIN_PASS){
    sessionStorage.setItem(SESSION_KEY,'1');
    $('loginErr').classList.add('hidden');
    $('loginScreen').classList.add('hidden');
    $('adminPanel').classList.remove('hidden');
    renderAdmin();
  } else {
    $('loginErr').classList.remove('hidden');
    $('loginBtn').classList.add('shake');
    setTimeout(()=>$('loginBtn').classList.remove('shake'),400);
    $('loginPass').value='';
    $('loginPass').focus();
  }
}

$('logoutBtn').addEventListener('click',()=>{
  sessionStorage.removeItem(SESSION_KEY);
  $('adminPanel').classList.add('hidden');
  $('loginScreen').classList.remove('hidden');
  $('loginUser').value='';
  $('loginPass').value='';
});

/* ── DATA (JSONBin.io — sama persis dengan app.js) ── */
const JSONBIN_BIN_ID  = '69bca93e56e12a1d72419c80';   // ← isi sama seperti di app.js
const JSONBIN_API_KEY = '$2a$10$JBjO44wdDLPbGNsaPZRfzOoCdqZ9ce579lV80FLZGxqOAB8d4Is3m';   // ← isi sama seperti di app.js
const JSONBIN_URL     = 'https://api.jsonbin.io/v3/b/'+JSONBIN_BIN_ID;

async function loadUlasan(){
  try{
    const r=await fetch(JSONBIN_URL+'/latest',{headers:{'X-Master-Key':JSONBIN_API_KEY}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    const data=j.record!==undefined?j.record:j;
    return Array.isArray(data)?data:[];
  }catch(e){
    console.warn('JSONBin load gagal:', e);
    try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch(_){ return []; }
  }
}
async function saveUlasan(list){
  try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(list)); }catch(_){}
  try{
    const r=await fetch(JSONBIN_URL,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_API_KEY},
      body:JSON.stringify(list)
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
  }catch(e){
    console.warn('JSONBin save gagal:', e);
  }
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function waktu(ts){
  const d=new Date(ts);
  const D=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  const M=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
  return D[d.getDay()]+', '+d.getDate()+' '+M[d.getMonth()]+' '+d.getFullYear()
    +' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

/* ── CONFIRM ── */
let delIdx=null;
$('confirmOverlay').addEventListener('click',closeConfirm);
$('confirmNo').addEventListener('click',closeConfirm);
$('confirmYes').addEventListener('click',async()=>{
  if(delIdx===null)return;
  $('confirmYes').textContent='Menghapus...';
  const l=await loadUlasan(); l.splice(delIdx,1); await saveUlasan(l);
  closeConfirm(); renderAdmin();
});
function openConfirm(i){ delIdx=i; $('confirmModal').classList.remove('hidden'); }
function closeConfirm(){ $('confirmModal').classList.add('hidden'); delIdx=null; $('confirmYes').textContent='Hapus'; }

/* ── RENDER ── */
async function renderAdmin(){
  const c=$('adminList');
  c.innerHTML='<div class="admin-empty" style="border-style:solid">⏳ Memuat ulasan...</div>';
  const list=await loadUlasan();
  $('statTotal').textContent=list.length;
  $('statAvg').textContent=list.length?(list.reduce((s,u)=>s+u.rating,0)/list.length).toFixed(1):'0.0';
  $('statReplied').textContent=list.filter(u=>u.reply).length;
  c.innerHTML='';
  if(!list.length){ c.innerHTML='<div class="admin-empty">&#128477; Belum ada ulasan dari pengguna.</div>'; return; }

  [...list].reverse().forEach((u,ri)=>{
    const realIdx=list.length-1-ri;
    const card=document.createElement('div'); card.className='admin-ulasan-card';
    const head=document.createElement('div'); head.className='auc-head';
    head.innerHTML='<div><div class="auc-nama">'+esc(u.nama||'Anonim')+'</div><div class="auc-waktu">'+waktu(u.ts)+'</div></div>';
    card.appendChild(head);
    const starDiv=document.createElement('div'); starDiv.className='auc-stars';
    for(let i=1;i<=5;i++){const s=document.createElement('span');s.textContent='★';if(i<=u.rating)s.classList.add('on');starDiv.appendChild(s);}
    card.appendChild(starDiv);
    const tDiv=document.createElement('div'); tDiv.className='auc-teks'+(u.teks?'':' empty');
    tDiv.textContent=u.teks||'(tidak ada teks ulasan)';
    card.appendChild(tDiv);
    if(u.reply){
      const rb=document.createElement('div'); rb.className='auc-reply-block';
      rb.innerHTML='<div class="auc-reply-lbl">&#x21A9; Balasan Admin</div><div class="auc-reply-txt">'+esc(u.reply)+'</div>';
      card.appendChild(rb);
    }
    const act=document.createElement('div'); act.className='auc-actions';
    const bBalas=document.createElement('button'); bBalas.className='btn-balas'; bBalas.textContent=u.reply?'Edit Balasan':'Balas';
    const bHapus=document.createElement('button'); bHapus.className='btn-hapus'; bHapus.textContent='Hapus';
    act.appendChild(bBalas); act.appendChild(bHapus);
    card.appendChild(act);
    const form=document.createElement('div'); form.className='auc-reply-form hidden';
    const ta=document.createElement('textarea'); ta.className='reply-textarea'; ta.rows=3;
    ta.placeholder='Tulis balasan di sini…'; ta.maxLength=300; ta.value=u.reply||'';
    const fbtns=document.createElement('div'); fbtns.className='reply-form-btns';
    const bBatal=document.createElement('button'); bBatal.className='btn-batal'; bBatal.textContent='Batal';
    const bKirim=document.createElement('button'); bKirim.className='btn-kirim'; bKirim.textContent='Kirim';
    fbtns.appendChild(bBatal); fbtns.appendChild(bKirim);
    form.appendChild(ta); form.appendChild(fbtns);
    card.appendChild(form);
    bBalas.addEventListener('click',()=>{ form.classList.toggle('hidden'); if(!form.classList.contains('hidden')) ta.focus(); });
    bBatal.addEventListener('click',()=>form.classList.add('hidden'));
    bKirim.addEventListener('click',async()=>{
      const t=ta.value.trim(); if(!t)return;
      bKirim.textContent='Menyimpan...'; bKirim.disabled=true;
      const l=await loadUlasan(); l[realIdx].reply=t; await saveUlasan(l); renderAdmin();
    });
    bHapus.addEventListener('click',()=>openConfirm(realIdx));
    c.appendChild(card);
  });
}

checkSession();
</script>
</body>
</html>
