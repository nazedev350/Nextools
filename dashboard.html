<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NexDown — Dashboard API</title>
<link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dtc7vwbm7/image/upload/v1773713181/j6sr8hhpamotcf0gtnzl.jpg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08070f;--surface:#110f1e;--surface2:#1a1730;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#f0eeff;--muted:#6b6488;--muted2:#9490b8;
  --accent:#a78bfa;--accent2:#f472b6;--green:#34d399;--red:#f87171;--yellow:#fbbf24;
  --r-sm:10px;--r-md:16px;--r-lg:22px;--r-xl:30px;
  --shadow:0 8px 40px rgba(0,0,0,.65);--glow:0 0 30px rgba(167,139,250,.2);
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100dvh;-webkit-font-smoothing:antialiased}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 50% at 15% 20%,rgba(167,139,250,.11) 0%,transparent 60%),
             radial-gradient(ellipse 50% 40% at 85% 80%,rgba(244,114,182,.08) 0%,transparent 60%)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
@keyframes blink{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.5)}70%{box-shadow:0 0 0 6px rgba(52,211,153,0)}}
@keyframes blink-red{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.5)}70%{box-shadow:0 0 0 6px rgba(248,113,113,0)}}

/* ── WRAP ── */
.wrap{max-width:560px;margin:0 auto;padding:0 16px 60px;position:relative;z-index:1}

/* ── HEADER ── */
.dash-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
.dash-brand{display:flex;align-items:center;gap:10px}
.dash-brand img{width:38px;height:38px;border-radius:12px;object-fit:cover;border:1.5px solid var(--border2)}
.dash-title{font-family:var(--font-head);font-size:1.05rem;font-weight:800;background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.dash-sub{font-size:.66rem;color:var(--muted);margin-top:2px}
.back-btn{background:var(--surface);border:1px solid var(--border2);color:var(--muted2);padding:7px 14px;border-radius:8px;cursor:pointer;font-family:var(--font-head);font-size:.72rem;font-weight:700;text-decoration:none;transition:background .2s,color .2s}
.back-btn:hover{background:var(--surface2);color:var(--accent)}

/* ── SUMMARY BAR ── */
.summary-bar{display:flex;gap:10px;margin-bottom:22px}
.sum-card{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);padding:13px 12px;text-align:center}
.sum-val{font-family:var(--font-head);font-size:1.55rem;font-weight:800;line-height:1}
.sum-val.green{background:linear-gradient(135deg,#34d399,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sum-val.red{background:linear-gradient(135deg,#f87171,#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sum-val.yellow{background:linear-gradient(135deg,#fbbf24,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sum-lbl{font-size:.65rem;color:var(--muted);margin-top:4px}

/* ── REFRESH ── */
.refresh-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:var(--font-head);font-size:.9rem;font-weight:800;color:var(--text)}
.refresh-info{font-size:.68rem;color:var(--muted);display:flex;align-items:center;gap:8px}
.refresh-btn{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.25);color:var(--accent);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:var(--font-head);font-size:.7rem;font-weight:700;transition:background .2s;display:flex;align-items:center;gap:6px}
.refresh-btn:hover{background:rgba(167,139,250,.22)}
.refresh-btn:disabled{opacity:.4;cursor:not-allowed}
.spin-icon{display:inline-block;animation:spin 1s linear infinite}

/* ── API GROUP ── */
.api-group{margin-bottom:20px}
.api-group-title{font-size:.72rem;font-family:var(--font-head);color:var(--muted2);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.api-group-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── API CARD ── */
.api-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);padding:14px 14px 13px;margin-bottom:10px;display:flex;align-items:center;gap:14px;animation:fadeIn .3s ease;transition:border-color .3s}
.api-card.ok{border-color:rgba(52,211,153,.25)}
.api-card.fail{border-color:rgba(248,113,113,.22)}
.api-card.checking{border-color:rgba(251,191,36,.18)}

/* platform icon */
.api-plat-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.api-plat-icon svg,.api-plat-icon img{width:100%;height:100%;object-fit:contain}

/* info */
.api-info{flex:1;min-width:0}
.api-name{font-family:var(--font-head);font-size:.84rem;font-weight:700;color:var(--text)}
.api-ping{font-size:.65rem;color:var(--muted2);margin-top:3px}

/* indicator */
.api-indicator{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px}
.ind-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.ind-dot.green{background:var(--green);animation:blink 2s infinite}
.ind-dot.red{background:var(--red);animation:blink-red 2s infinite}
.ind-dot.yellow{background:var(--yellow)}
.ind-dot.grey{background:var(--border2)}
.ind-label{font-size:.6rem;font-family:var(--font-head);font-weight:700;white-space:nowrap}
.ind-label.green{color:var(--green)}
.ind-label.red{color:var(--red)}
.ind-label.yellow{color:var(--yellow)}
.ind-label.grey{color:var(--muted)}

/* spinner kecil */
.mini-spin{width:12px;height:12px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--yellow);animation:spin .8s linear infinite;flex-shrink:0}

/* last check */
.last-check{text-align:center;font-size:.67rem;color:var(--muted);margin-top:8px;padding-top:16px;border-top:1px solid var(--border)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="wrap">

  <!-- HEADER -->
  <div class="dash-header">
    <div class="dash-brand">
      <img src="https://res.cloudinary.com/dtc7vwbm7/image/upload/v1773713181/j6sr8hhpamotcf0gtnzl.jpg" alt="NexDown"/>
      <div>
        <div class="dash-title">API Dashboard</div>
        <div class="dash-sub">Status real-time semua endpoint</div>
      </div>
    </div>
    <a href="/" class="back-btn">&#8592; Kembali</a>
  </div>

  <!-- SUMMARY -->
  <div class="summary-bar">
    <div class="sum-card"><div class="sum-val green" id="sumOk">—</div><div class="sum-lbl">&#9679; Aktif</div></div>
    <div class="sum-card"><div class="sum-val red" id="sumFail">—</div><div class="sum-lbl">&#9679; Mati</div></div>
    <div class="sum-card"><div class="sum-val yellow" id="sumCheck">—</div><div class="sum-lbl">&#9679; Cek...</div></div>
  </div>

  <!-- REFRESH -->
  <div class="refresh-row">
    <span class="section-title">&#128268; Status API</span>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="refresh-info" id="lastCheckLabel">Belum dicek</span>
      <button class="refresh-btn" id="refreshBtn" onclick="runAllChecks()">
        <span id="refreshIcon">&#8635;</span> Refresh
      </button>
    </div>
  </div>

  <!-- API LIST -->
  <div id="apiContainer"></div>

  <div class="last-check" id="lastCheckFull"></div>
</div>

<script>
'use strict';

/* ── DEFINISI API ── */
const API_GROUPS = [
  {
    group: 'TikTok',
    icon: `<svg viewBox="0 0 24 24" fill="#fff" style="background:#010101;border-radius:6px;width:100%;height:100%"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.77 1.52V6.73a4.85 4.85 0 01-1-.04z"/></svg>`,
    apis: [
      { id:'tt1', name:'TikTok V1', endpoint:'https://api.siputzx.my.id/api/d/tiktok?url=https://www.tiktok.com/@tiktok/video/7106594312292453675' },
      { id:'tt2', name:'TikTok V2', endpoint:'https://api.siputzx.my.id/api/d/tiktok/v2?url=https://www.tiktok.com/@tiktok/video/7106594312292453675' },
      { id:'tt3', name:'TikTok V3', endpoint:'https://api.siputzx.my.id/api/d/tiktok/v3?url=https://www.tiktok.com/@tiktok/video/7106594312292453675' },
    ]
  },
  {
    group: 'Facebook',
    icon: `<svg viewBox="0 0 24 24" fill="#1877f2" style="width:100%;height:100%"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>`,
    apis: [
      { id:'fb1', name:'Facebook Downloader', endpoint:'https://api.siputzx.my.id/api/d/facebook?url=https://www.facebook.com/share/v/1' },
    ]
  },
  {
    group: 'Instagram',
    icon: `<svg viewBox="0 0 24 24" style="width:100%;height:100%"><defs><radialGradient id="igD" cx="30%" cy="107%" r="150%"><stop offset="0%" stop-color="#fdf497"/><stop offset="45%" stop-color="#fd5949"/><stop offset="60%" stop-color="#d6249f"/><stop offset="90%" stop-color="#285AEB"/></radialGradient></defs><path fill="url(#igD)" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>`,
    apis: [
      { id:'ig1', name:'Instagram FastDL', endpoint:'https://api.siputzx.my.id/api/d/fastdl?url=https://www.instagram.com/p/test/' },
    ]
  },
  {
    group: 'Spotify',
    icon: `<svg viewBox="0 0 24 24" fill="#1db954" style="width:100%;height:100%"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>`,
    apis: [
      { id:'sp1', name:'Spotify Downloader', endpoint:'https://api.yupra.my.id/api/downloader/spotify?url=https://open.spotify.com/track/4iV5W9uYEdYUVa79Axb7Rh' },
    ]
  },
  {
    group: 'SoundCloud',
    icon: `<svg viewBox="0 0 24 24" fill="#ff5500" style="width:100%;height:100%"><path d="M1.175 12.225c-.017 0-.034.002-.05.006-.017-.004-.034-.006-.05-.006-.225 0-.407.182-.407.407v.001c0 .224.181.406.406.406.017 0 .034-.002.05-.006.017.004.034.006.05.006.225 0 .406-.181.406-.406v-.001c0-.225-.181-.407-.405-.407zm1.469-.83c-.025 0-.049.004-.073.01-.025-.006-.049-.01-.073-.01-.337 0-.609.272-.609.609v.001c0 .337.272.609.609.609.025 0 .049-.004.073-.01.025.006.049.01.073.01.337 0 .609-.272.609-.609v-.001c0-.337-.272-.609-.609-.609zM24 11.175c0-2.251-1.824-4.076-4.075-4.076-.285 0-.563.03-.832.087C18.48 5.648 16.91 4.5 15.075 4.5c-.583 0-1.137.131-1.631.364C12.503 3.124 11.059 2.25 9.419 2.25c-2.758 0-4.994 2.236-4.994 4.994 0 .152.007.302.021.45C2.906 8.151 2.25 9.184 2.25 10.35c0 1.763 1.429 3.192 3.192 3.192H20.6c1.874 0 3.4-1.525 3.4-3.4v-.032l.001.065z"/></svg>`,
    apis: [
      { id:'sc1', name:'SoundCloud Downloader', endpoint:'https://api.siputzx.my.id/api/d/soundcloud?url=https://soundcloud.com/test/test' },
    ]
  },
  {
    group: 'X / Twitter',
    icon: `<svg viewBox="0 0 24 24" fill="#fff" style="background:#000;border-radius:6px;padding:2px;width:100%;height:100%"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.259 5.631 5.905-5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,
    apis: [
      { id:'tw1', name:'X / Twitter (ssstwiter)', endpoint:'https://api.siputzx.my.id/api/d/ssstwiter?url=https://x.com/test/status/1' },
    ]
  },
];

/* ── STATE ── */
const state = {};
API_GROUPS.forEach(g => g.apis.forEach(a => { state[a.id]={status:'idle',ping:null}; }));

/* ── BUILD UI ── */
function buildUI(){
  const container = document.getElementById('apiContainer');
  container.innerHTML = '';
  API_GROUPS.forEach(g => {
    const grpDiv = document.createElement('div');
    grpDiv.className = 'api-group';
    grpDiv.innerHTML = '<div class="api-group-title"><span>'+g.group+'</span></div>';
    g.apis.forEach(a => {
      const card = document.createElement('div');
      card.className = 'api-card';
      card.id = 'card-'+a.id;
      card.innerHTML = `
        <div class="api-plat-icon">${g.icon}</div>
        <div class="api-info">
          <div class="api-name">${a.name}</div>
          <div class="api-ping" id="ping-${a.id}">Menunggu cek...</div>
        </div>
        <div class="api-indicator" id="ind-${a.id}">
          <div class="ind-dot grey"></div>
          <span class="ind-label grey">—</span>
        </div>`;
      grpDiv.appendChild(card);
    });
    container.appendChild(grpDiv);
  });
}

/* ── CHECK 1 API ── */
async function checkApi(api){
  setIndicator(api.id, 'checking');
  document.getElementById('ping-'+api.id).textContent = 'Mengecek...';
  const t0 = Date.now();
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 10000);
    const r = await fetch(api.endpoint, { signal: ctrl.signal, mode:'cors' });
    clearTimeout(tid);
    const ping = Date.now() - t0;
    // anggap aktif jika response diterima (walaupun datanya error karena URL test)
    const ok = r.status < 500;
    state[api.id] = { status: ok?'ok':'fail', ping };
    setIndicator(api.id, ok?'ok':'fail', ping);
    document.getElementById('ping-'+api.id).textContent = ok
      ? 'Latensi: ' + ping + 'ms'
      : 'Timeout / Error ' + r.status;
  } catch(e) {
    const ping = Date.now() - t0;
    state[api.id] = { status:'fail', ping };
    setIndicator(api.id, 'fail', ping);
    document.getElementById('ping-'+api.id).textContent = e.name==='AbortError' ? 'Timeout (>10s)' : 'Tidak dapat dijangkau';
  }
  updateSummary();
}

/* ── INDICATOR ── */
function setIndicator(id, status, ping){
  const card = document.getElementById('card-'+id);
  const ind  = document.getElementById('ind-'+id);
  card.className = 'api-card ' + (status==='ok'?'ok':status==='fail'?'fail':'checking');
  if(status === 'checking'){
    ind.innerHTML = '<div class="mini-spin"></div><span class="ind-label yellow">Cek...</span>';
    return;
  }
  const color = status==='ok' ? 'green' : 'red';
  const label = status==='ok' ? 'Aktif' : 'Mati';
  ind.innerHTML = '<div class="ind-dot '+color+'"></div><span class="ind-label '+color+'">'+label+'</span>';
}

/* ── SUMMARY ── */
function updateSummary(){
  const all = Object.values(state);
  const ok   = all.filter(s=>s.status==='ok').length;
  const fail = all.filter(s=>s.status==='fail').length;
  const chk  = all.filter(s=>s.status==='checking'||s.status==='idle').length;
  document.getElementById('sumOk').textContent = ok;
  document.getElementById('sumFail').textContent = fail;
  document.getElementById('sumCheck').textContent = chk;
}

/* ── RUN ALL ── */
async function runAllChecks(){
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.disabled = true;
  icon.className = 'spin-icon';
  icon.textContent = '↻';
  API_GROUPS.forEach(g => g.apis.forEach(a => { state[a.id].status='checking'; }));
  updateSummary();
  const allApis = API_GROUPS.flatMap(g => g.apis);
  await Promise.all(allApis.map(a => checkApi(a)));
  const now = new Date();
  const timeStr = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  document.getElementById('lastCheckLabel').textContent = 'Update: '+timeStr;
  document.getElementById('lastCheckFull').textContent = 'Terakhir dicek: '+now.toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+' pukul '+timeStr;
  icon.className = '';
  icon.textContent = '⟳';
  btn.disabled = false;
}

// init
buildUI();
updateSummary();
runAllChecks();
// auto refresh tiap 60 detik
setInterval(runAllChecks, 60000);
</script>
</body>
</html>
